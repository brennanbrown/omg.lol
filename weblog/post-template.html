Type: Template
Title: Post Template

<article>
	<header class="post-header">
		<h1>{post-title}</h1>
		<div class="post-metadata">
			<div class="post-metadata-item">
				<i class="fa-regular fa-calendar"></i>
				<time datetime="{post-date}">{date}</time>
			</div>
			<div class="post-metadata-item">
				<i class="fa-regular fa-clock"></i>
				<span class="reading-time">Calculating...</span>
			</div>
		</div>
	</header>
	
	<div class="post-body">
		{body}
	</div>
	
	<footer class="post-footer">
		<div class="post-tags">{tags}</div>
	</footer>
</article>

<script>
  // Calculate reading time and style first word
  document.addEventListener('DOMContentLoaded', function() {
    const postBody = document.querySelector('.post-body');
    const readingTimeSpan = document.querySelector('.reading-time');
    
    if (postBody && readingTimeSpan) {
      const text = postBody.innerText || postBody.textContent;
      const wordCount = text.trim().split(/\s+/).length;
      const readingTime = Math.ceil(wordCount / 200);
      readingTimeSpan.textContent = readingTime + ' min read';
    }
    
    const firstParagraph = document.querySelector('.post-body > p:first-of-type');
    if (firstParagraph) {
      const text = firstParagraph.innerHTML;
      const firstWord = text.match(/^([\w]+)/);
      if (firstWord) {
        firstParagraph.innerHTML = text.replace(firstWord[0], '<span class="drop-cap-word">' + firstWord[0] + '</span>');
      }
    }
  });
</script>

<span class="divider"></span>
